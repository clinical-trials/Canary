<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cannabis Canary app icon">
  <!-- Cannabis Canary(c) square app icon.
       Simplified geometry tuned to stay legible at 32 px and 16 px:
       no eye, no wing accent, a single bold signal arc, thicker legs/perch.
       Ink bird on canary field (contrast 9.4:1). -->

  <rect width="64" height="64" rx="14" fill="#F7C948"/>
  <g fill="#1F2933">
    <!-- tail -->
    <polygon points="11,30.5 28,27 28.5,36"/>
    <!-- body -->
    <circle cx="33" cy="35" r="11"/>
    <!-- head -->
    <circle cx="42.5" cy="24" r="7.5"/>
    <!-- beak -->
    <polygon points="48.5,21.5 55,24.5 48.5,27.5"/>
    <!-- legs -->
    <rect x="29.5" y="44.5" width="2.6" height="7"/>
    <rect x="34.9" y="44.5" width="2.6" height="7"/>
    <!-- perch -->
    <rect x="17" y="50.5" width="30" height="3.6" rx="1.8"/>
  </g>
  <!-- single signal arc -->
  <path d="M58.9 19.6 A6 6 0 0 1 58.9 29.4" fill="none" stroke="#1F2933" stroke-width="3" stroke-linecap="round"/>
</svg>
