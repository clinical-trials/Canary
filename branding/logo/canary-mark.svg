<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cannabis Canary mark: geometric perched canary emitting a signal">
  <!-- Cannabis Canary(c) primary mark.
       A geometric canary perched on a bar (the sentinel), emitting signal arcs
       (the early warning). Built from circles and triangles so it stays crisp
       at small sizes. No cannabis imagery by design. -->

  <!-- tail -->
  <polygon points="16,48 42,42 43,55" fill="#F0B429"/>
  <!-- body -->
  <circle cx="50" cy="54" r="17" fill="#F0B429"/>
  <!-- wing accent -->
  <path d="M40 54 a9.5 6.5 0 1 0 19 0 a9.5 6.5 0 1 0 -19 0" fill="#DE911D" transform="rotate(-22 49.5 54)"/>
  <!-- head with knocked-out eye -->
  <path fill-rule="evenodd" fill="#F0B429" d="M54 37 a11 11 0 1 0 22 0 a11 11 0 1 0 -22 0 M65.5 34.5 a2 2 0 1 0 4 0 a2 2 0 1 0 -4 0"/>
  <!-- beak -->
  <polygon points="74,33 84,37 74,41" fill="#1F2933"/>
  <!-- legs -->
  <rect x="45.5" y="69" width="2.2" height="10" fill="#1F2933"/>
  <rect x="52.3" y="69" width="2.2" height="10" fill="#1F2933"/>
  <!-- perch -->
  <rect x="26" y="78.5" width="48" height="4" rx="2" fill="#1F2933"/>
  <!-- signal arcs -->
  <path d="M89.5 31.6 A7 7 0 0 1 89.5 42.4" fill="none" stroke="#1F2933" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M92.7 27.8 A12 12 0 0 1 92.7 46.2" fill="none" stroke="#1F2933" stroke-width="2.6" stroke-linecap="round"/>
</svg>
