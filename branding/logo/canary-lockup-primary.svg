<svg viewBox="0 0 470 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cannabis Canary primary lockup">
  <!-- Cannabis Canary(c) primary lockup: mark + wordmark.
       NOTE: the wordmark uses the product's system font stack so it matches
       the in-app rendering environment (Epic Hyperdrive webview). Before
       external distribution (e.g., listing artwork), convert the text to
       outlines in a vector editor so rendering is identical everywhere. -->

  <!-- mark (same geometry as canary-mark.svg, scaled and centered) -->
  <g transform="translate(6,10) scale(1.0)">
    <polygon points="16,48 42,42 43,55" fill="#F0B429"/>
    <circle cx="50" cy="54" r="17" fill="#F0B429"/>
    <path d="M40 54 a9.5 6.5 0 1 0 19 0 a9.5 6.5 0 1 0 -19 0" fill="#DE911D" transform="rotate(-22 49.5 54)"/>
    <path fill-rule="evenodd" fill="#F0B429" d="M54 37 a11 11 0 1 0 22 0 a11 11 0 1 0 -22 0 M65.5 34.5 a2 2 0 1 0 4 0 a2 2 0 1 0 -4 0"/>
    <polygon points="74,33 84,37 74,41" fill="#1F2933"/>
    <rect x="45.5" y="69" width="2.2" height="10" fill="#1F2933"/>
    <rect x="52.3" y="69" width="2.2" height="10" fill="#1F2933"/>
    <rect x="26" y="78.5" width="48" height="4" rx="2" fill="#1F2933"/>
    <path d="M89.5 31.6 A7 7 0 0 1 89.5 42.4" fill="none" stroke="#1F2933" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M92.7 27.8 A12 12 0 0 1 92.7 46.2" fill="none" stroke="#1F2933" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <text x="122" y="72"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="600" letter-spacing="0.2" fill="#1F2933">Cannabis Canary<tspan dy="-12" font-size="15" font-weight="500">&#169;</tspan></text>

  <!-- descriptor line -->
  <text x="123" y="94"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" letter-spacing="1.2" fill="#3E4C59">STRUCTURED CANNABIS SOCIAL HISTORY</text>
</svg>
